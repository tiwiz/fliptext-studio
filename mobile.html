<header class="fixed top-0 w-full z-50 bg-surface/60 backdrop-blur-md dark:bg-surface/60 border-b border-outline-variant/10 flex justify-between items-center px-gutter h-16">

<div class="flex items-center gap-4">
<button class="text-on-surface-variant dark:text-on-surface-variant hover:opacity-80 transition-opacity active:scale-95 duration-100">

</button>
</div>

<span class="material-symbols-outlined" data-icon="orbit">orbit</span>
</button>

</button>

</button>
</div>
<div class="absolute top-4 left-4">
<span class="bg-secondary/10 text-secondary px-3 py-1 rounded-full text-label-mono font-label-mono border border-secondary/20 uppercase tracking-widest">

</div>
</section>
<!-- Customization Section -->

<input class="w-full bg-surface-container-low border-0 border-b-2 border-outline-variant focus:border-secondary focus:ring-0 text-headline-md font-headline-md text-on-surface transition-colors duration-300 uppercase tracking-wider h-14" placeholder="ENTER TEXT" type="text" value="AUGURI"/>
</div>
<div class="group">
<label class="block font-label-mono text-label-mono text-outline uppercase mb-2">Name 2</label>

</div>
</div>

<span class="material-symbols-outlined text-[16px]" data-icon="expand_more">expand_more</span>

</div>
</div>
<div class="space-y-2">

<span class="material-symbols-outlined text-[16px]" data-icon="expand_more">expand_more</span>
